name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `/ideate` with...
        2. Then run `/create-prd`...
        3. See error in...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Kit Version
      description: Which version of cfsa-antigravity are you using?
      placeholder: "e.g. 2.1.0"
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: AI Agent
      description: Which AI agent are you using with the kit?
      options:
        - Claude (Anthropic)
        - Gemini (Google)
        - GPT (OpenAI)
        - Cursor
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs.
